name: DocuZen Eval

# Runs manually only. Trigger from the Actions tab when you want to run a quality check.
# This avoids burning OpenAI tokens on every push.

on:
  workflow_dispatch:

jobs:
  eval:
    name: Regression eval
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run eval scorer
        env:
          # Set this secret in GitHub → Settings → Secrets → Actions
          # Value should be your deployed Render backend URL
          # e.g. https://docuzen-backend.onrender.com
          DOCUZEN_API_URL: ${{ secrets.DOCUZEN_API_URL }}
          EVAL_THRESHOLD: "0.75"
        run: python evals/scorer.py
